<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pages Per Day</title>
<meta name="description" content="How many pages per day do you need to read?">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pages/Day">
<meta name="theme-color" content="#f7f3ee">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:#f7f3ee}
  body{
    font-family:'DM Sans',system-ui,sans-serif;color:#2c2418;background:#f7f3ee;
    min-height:100vh;min-height:100dvh;
    padding:env(safe-area-inset-top) 20px 20px;
    display:flex;justify-content:center;
  }
  .card{width:100%;max-width:480px;padding-top:40px;padding-bottom:60px}
  h1{
    font-family:'Playfair Display',serif;font-size:32px;font-weight:700;
    letter-spacing:-.5px;color:#1a1208;line-height:1.15;
  }
  .subtitle{font-size:14px;color:#7a6f5f;margin-top:6px}
  .divider{height:1px;background:#d6cfc3;margin:24px 0}
  .field{margin-bottom:20px;position:relative}
  .field label{
    display:block;font-size:11px;font-weight:600;text-transform:uppercase;
    letter-spacing:1.2px;color:#8a7e6e;margin-bottom:8px;
  }
  .field input{
    width:100%;padding:12px 16px;border:1.5px solid #d6cfc3;border-radius:8px;
    background:#fffcf7;font-family:'DM Sans',sans-serif;font-size:16px;
    color:#2c2418;outline:none;transition:border-color .2s;
    -webkit-appearance:none;appearance:none;
  }
  .field input:focus{border-color:#8a7e6e}
  .field input::placeholder{color:#c4baa8}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

  /* Search wrapper */
  .search-wrap{position:relative}
  .search-wrap input{padding-right:70px}
  .lookup-btn{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:#ece6db;border:none;border-radius:6px;padding:6px 12px;
    font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
    color:#6b6052;cursor:pointer;transition:background .15s;
    letter-spacing:.3px;
  }
  .lookup-btn:hover,.lookup-btn:active{background:#ddd5c6}
  .lookup-btn:disabled{opacity:.5;cursor:default}

  /* Dropdown */
  .dropdown{
    position:absolute;top:100%;left:0;right:0;z-index:10;
    background:#fffcf7;border:1.5px solid #d6cfc3;border-radius:10px;
    margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(26,18,8,.1);
    max-height:340px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .dropdown:empty{display:none}
  .dd-item{
    display:flex;align-items:center;gap:12px;padding:10px 14px;
    cursor:pointer;transition:background .15s;border-bottom:1px solid #ece6db;
  }
  .dd-item:last-child{border-bottom:none}
  .dd-item:hover,.dd-item:active{background:#f0ebe2}
  .dd-cover{width:36px;height:54px;border-radius:4px;object-fit:cover;background:#e8e0d4;flex-shrink:0}
  .dd-cover-ph{
    width:36px;height:54px;border-radius:4px;background:#e8e0d4;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#b5a992;
  }
  .dd-info{flex:1;min-width:0}
  .dd-title{font-size:14px;font-weight:600;color:#2c2418;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-sub{font-size:12px;color:#8a7e6e;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-pages{font-size:12px;font-weight:600;color:#6b6052;flex-shrink:0;background:#ece6db;padding:3px 8px;border-radius:12px}
  .dd-msg{padding:14px;text-align:center;font-size:13px;color:#8a7e6e}

  /* Results */
  .result-card{
    background:#1a1208;border-radius:12px;padding:28px;color:#f7f3ee;
    animation:slideUp .35s ease-out;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .r-big{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;line-height:1;color:#f0e6d3}
  .r-big span{font-size:20px;font-weight:400;color:#a89b87;margin-left:4px}
  .r-label{font-size:13px;color:#a89b87;margin-top:4px}
  .prog-track{width:100%;height:4px;background:#3a3020;border-radius:2px;margin-top:16px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,#8a7e6e,#d4c5a9);border-radius:2px;transition:width .5s ease}
  .r-meta{display:flex;gap:24px;margin-top:20px;padding-top:18px;border-top:1px solid #3a3020}
  .m-item{display:flex;flex-direction:column}
  .m-val{font-size:18px;font-weight:600;color:#f0e6d3;font-family:'Playfair Display',serif}
  .m-lbl{font-size:11px;color:#7a6f5f;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
  .effort-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:16px;letter-spacing:.3px}
  .done-card{
    background:#1a1208;border-radius:12px;padding:28px;color:#f0e6d3;
    text-align:center;animation:slideUp .35s ease-out;
    font-family:'Playfair Display',serif;font-size:22px;
  }
  .error-msg{background:#3a1c1c;color:#e8a0a0;padding:16px 20px;border-radius:12px;font-size:14px;animation:slideUp .35s ease-out}
</style>
</head>
<body>
<div class="card">
  <h1>How many pages<br>per day?</h1>
  <p class="subtitle">Type a book, set your deadline, get your daily target.</p>
  <div class="divider"></div>

  <div class="field">
    <label>Book title</label>
    <div class="search-wrap">
      <input type="text" id="book-title" placeholder="e.g. The Corrections" autocomplete="off" autocorrect="off">
      <button class="lookup-btn" id="lookup-btn">Look up</button>
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <div class="row-3">
    <div class="field">
      <label>Total pages</label>
      <input type="number" id="total-pages" placeholder="e.g. 576" min="1" inputmode="numeric">
    </div>
    <div class="field">
      <label>Pages read</label>
      <input type="number" id="pages-read" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="field">
      <label>Finish by</label>
      <input type="date" id="deadline">
    </div>
  </div>

  <div class="divider"></div>
  <div id="result-slot"></div>
</div>

<script>
(function(){
  const titleInput = document.getElementById('book-title');
  const totalPagesInput = document.getElementById('total-pages');
  const pagesReadInput = document.getElementById('pages-read');
  const deadlineInput = document.getElementById('deadline');
  const resultSlot = document.getElementById('result-slot');
  const lookupBtn = document.getElementById('lookup-btn');
  const dropdown = document.getElementById('dropdown');

  const today = new Date(); today.setHours(0,0,0,0);
  deadlineInput.min = today.toISOString().split('T')[0];

  let lastResults = [];

  // --- Optional lookup via Open Library ---
  async function searchBooks(q){
    try{
      const r = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=6&fields=key,title,author_name,first_publish_year,number_of_pages_median,cover_i`);
      const d = await r.json();
      if(!d.docs) return [];
      return d.docs.map(doc=>({
        title: doc.title||'Untitled',
        authors: (doc.author_name||[]).join(', ')||'Unknown',
        pages: doc.number_of_pages_median||null,
        cover: doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-S.jpg` : null,
        year: doc.first_publish_year||null,
      }));
    }catch(e){
      return [];
    }
  }

  lookupBtn.addEventListener('click', async ()=>{
    const q = titleInput.value.trim();
    if(q.length < 2) return;
    lookupBtn.disabled = true;
    lookupBtn.textContent = '…';
    dropdown.innerHTML = '<div class="dd-msg">Searching…</div>';
    const books = await searchBooks(q);
    lastResults = books;
    lookupBtn.disabled = false;
    lookupBtn.textContent = 'Look up';
    if(!books.length){
      dropdown.innerHTML = '<div class="dd-msg">No results — enter pages manually</div>';
      setTimeout(()=>{ dropdown.innerHTML=''; }, 2000);
      return;
    }
    dropdown.innerHTML = books.map((b,i)=>`
      <div class="dd-item" data-idx="${i}">
        ${b.cover
          ? `<img class="dd-cover" src="${b.cover}" alt="">`
          : `<div class="dd-cover-ph">📖</div>`}
        <div class="dd-info">
          <div class="dd-title">${esc(b.title)}</div>
          <div class="dd-sub">${esc(b.authors)}${b.year?' · '+b.year:''}</div>
        </div>
        ${b.pages ? `<div class="dd-pages">${b.pages} pg</div>` : ''}
      </div>
    `).join('');
    dropdown.querySelectorAll('.dd-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        const b = lastResults[+el.dataset.idx];
        titleInput.value = b.title;
        if(b.pages) totalPagesInput.value = b.pages;
        dropdown.innerHTML = '';
        calc();
        if(!b.pages) totalPagesInput.focus();
        else if(!deadlineInput.value) deadlineInput.focus();
      });
    });
  });

  // Also trigger lookup on Enter in title field
  titleInput.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); lookupBtn.click(); }
  });

  // Close dropdown on outside click
  document.addEventListener('mousedown', e=>{
    if(!e.target.closest('.search-wrap')) dropdown.innerHTML='';
  });

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // --- Calculation ---
  totalPagesInput.addEventListener('input', calc);
  pagesReadInput.addEventListener('input', calc);
  deadlineInput.addEventListener('input', calc);

  function calc(){
    const totalPages = parseInt(totalPagesInput.value)||0;
    if(!totalPages || !deadlineInput.value){ resultSlot.innerHTML=''; return; }

    const read = parseInt(pagesReadInput.value)||0;
    const remaining = totalPages - read;

    if(remaining <= 0){
      resultSlot.innerHTML = '<div class="done-card">You\'ve already finished this one! 🎉</div>';
      return;
    }

    const now = new Date(); now.setHours(0,0,0,0);
    const end = new Date(deadlineInput.value+'T00:00:00');
    const daysLeft = Math.ceil((end - now)/(1000*60*60*24));

    if(daysLeft <= 0){
      resultSlot.innerHTML = '<div class="error-msg">That deadline has already passed.</div>';
      return;
    }

    const ppd = remaining / daysLeft;
    const ppdCeil = Math.ceil(ppd);
    const mins = Math.round(ppd * 1.7);
    const pct = Math.round((read/totalPages)*100);

    let effortText, effortColor;
    if(ppdCeil<=15){ effortText='Light read'; effortColor='#4a7c59'; }
    else if(ppdCeil<=30){ effortText='Steady pace'; effortColor='#8b6914'; }
    else if(ppdCeil<=50){ effortText='Committed'; effortColor='#b45309'; }
    else { effortText='Sprint mode'; effortColor='#9f1239'; }

    resultSlot.innerHTML = `
      <div class="result-card">
        <div class="r-big">${ppdCeil}<span>pg/day</span></div>
        <div class="r-label">~${mins} min/day at average reading speed</div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="r-meta">
          <div class="m-item"><div class="m-val">${remaining}</div><div class="m-lbl">Pages left</div></div>
          <div class="m-item"><div class="m-val">${daysLeft}</div><div class="m-lbl">Days left</div></div>
          <div class="m-item"><div class="m-val">${pct}%</div><div class="m-lbl">Complete</div></div>
        </div>
        <div class="effort-tag" style="background:${effortColor}22;color:${effortColor}">${effortText}</div>
      </div>
    `;
  }
})();
</script>

<!-- Inline PWA manifest -->
<script>
(function(){
  const manifest = {
    name: "Pages Per Day",
    short_name: "Pages/Day",
    description: "How many pages per day to finish your book on time",
    start_url: ".",
    display: "standalone",
    background_color: "#f7f3ee",
    theme_color: "#f7f3ee",
    icons: [{
      src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><rect width="128" height="128" rx="28" fill="#1a1208"/><text x="64" y="82" font-family="serif" font-size="64" fill="#f0e6d3" text-anchor="middle">📖</text></svg>'),
      sizes: "128x128",
      type: "image/svg+xml"
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();
</script>

<!-- Minimal service worker for offline -->
<script>
if('serviceWorker' in navigator){
  const sw = `
    const CACHE = 'ppd-v3';
    const URLS = [self.location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS))));
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(()=>caches.match(self.location.href)))
      );
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
