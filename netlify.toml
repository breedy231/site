[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/api/trakt-token"
  to = "/.netlify/functions/trakt-token"
  status = 200

[[redirects]]
  from = "/api/goodreads"
  to = "/.netlify/functions/goodreads"
  status = 200

[[redirects]]
  from = "/api/lastfm"
  to = "/.netlify/functions/lastfm"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/progress"
  to = "/.netlify/functions/progress"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "npm run dev"
  targetPort = 4321
  port = 8888
